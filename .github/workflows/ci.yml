name: Pharmacy Management CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ['backend', 'admin-panel']
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Install dependencies
        run: yarn install
          
      - name: Run tests
        run: yarn workspace @pharmacy/${{ matrix.package }} test
          
      - name: Build package
        run: yarn workspace @pharmacy/${{ matrix.package }} build

  ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          cd packages/ai-service
          pip install -r requirements.txt
          
      - name: Run tests
        run: |
          cd packages/ai-service
          python -m pytest tests/

  deploy:
    needs: [test-and-build, ai-service]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      
      - name: Install dependencies
        run: yarn install
          
      - name: Build all packages
        run: yarn build
          
      - name: Deploy to production
        run: echo "Deploying to production server..."
        # Add your actual deployment commands here
        # Example: ssh, scp, or serverless deploy